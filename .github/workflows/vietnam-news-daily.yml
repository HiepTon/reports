# Vietnam RSS digest: Vietnamese summaries + categories (Gemini optional).
# Also builds the security digest index so GitHub Pages gets output/index.html + output/vietnam/index.html.
# Schedule: 22:00 UTC daily ≈ 05:00 next calendar day in Vietnam (ICT, UTC+7).
# See README "Vietnam news digest" for timezone note.

name: Vietnam news digest

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-security-news.txt
            requirements-vietnam-news.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-security-news.txt
          pip install -r requirements-vietnam-news.txt

      - name: Build Vietnam digest (for /vietnam/)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          GEMINI_FLAG=""
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            GEMINI_FLAG="--gemini"
            echo "GEMINI_API_KEY set: enabling Gemini (Vietnamese summary + category)."
          else
            echo "GEMINI_API_KEY not set: RSS excerpts only, category 'Chưa phân loại'."
          fi
          python scripts/fetch_vietnam_news.py \
            --days 1 \
            --per-source 20 \
            --limit 60 \
            --pause 0.3 \
            --html output/vietnam/index.html \
            $GEMINI_FLAG

      - name: Build security digest (site root index for Pages)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          GEMINI_FLAG=""
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            GEMINI_FLAG="--gemini"
            echo "GEMINI_API_KEY set: enabling Gemini (chunked summaries)."
          else
            echo "GEMINI_API_KEY not set; using RSS + heuristic text only."
          fi
          python scripts/fetch_security_news.py \
            --days 2 \
            --per-source 25 \
            --limit 50 \
            --pause 0.35 \
            --html output/index.html \
            --gemini-chunk-size 5 \
            --gemini-chunk-pause 32 \
            --gemini-max-excerpt-chars 450 \
            $GEMINI_FLAG

      - name: Disable Jekyll (static HTML only)
        run: touch output/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: output/

      - name: Upload Vietnam HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: vietnam-news
          path: output/vietnam/index.html
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
