# Vietnam RSS digest: Vietnamese summaries + categories (Gemini optional).
# Schedule: 22:00 UTC daily ≈ 05:00 next calendar day in Vietnam (ICT, UTC+7).
# See README "Vietnam news digest" for timezone note.

name: Vietnam news digest

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-vietnam-news.txt

      - name: Install dependencies
        run: pip install -r requirements-vietnam-news.txt

      - name: Build HTML
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          GEMINI_FLAG=""
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            GEMINI_FLAG="--gemini"
            echo "GEMINI_API_KEY set: enabling Gemini (Vietnamese summary + category)."
          else
            echo "GEMINI_API_KEY not set: RSS excerpts only, category 'Chưa phân loại'."
          fi
          python scripts/fetch_vietnam_news.py \
            --days 3 \
            --per-source 12 \
            --limit 24 \
            --pause 0.3 \
            --html output/vietnam/index.html \
            $GEMINI_FLAG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vietnam-news
          path: output/vietnam/index.html
          if-no-files-found: error
