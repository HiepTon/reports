# Builds the digest and publishes the output/ folder to GitHub Pages.
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Security news digest

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-security-news.txt

      - name: Install dependencies
        run: pip install -r requirements-security-news.txt

      - name: Build site (index.html for Pages root)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          GEMINI_FLAG=""
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            GEMINI_FLAG="--gemini"
            echo "GEMINI_API_KEY is set; enabling Gemini (chunked summaries)."
          else
            echo "GEMINI_API_KEY not set; using RSS + heuristic text only."
          fi
          python scripts/fetch_security_news.py \
            --days 3 \
            --per-source 25 \
            --limit 30 \
            --pause 0.35 \
            --html output/index.html \
            --gemini-chunk-size 5 \
            --gemini-chunk-pause 32 \
            --gemini-max-excerpt-chars 450 \
            $GEMINI_FLAG

      - name: Disable Jekyll (static HTML only)
        run: touch output/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Upload HTML copy as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-news
          path: output/index.html
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
